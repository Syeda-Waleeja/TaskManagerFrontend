<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Task Manager</h1>
        <input name="tasks" id="tasks" placeholder="What needs to be done?">
        <button class="add-task">Add Task</button><br>
        <div class="secs">
            <span>&#10003;</span>
            <p class="overline adjust-p">Task A</p>
            <button class="remove adjust-btn">Remove</button><br><br>
        </div>
        <div class="secs">

            <span>&#10003;</span>
            <p class="adjust-p">Task B</p>
            <button class="remove adjust-btn">Remove</button><br><br>
        </div>
        <div class="secs">
            <div class="selected"><span>&#10003;</span></div>
            <p class="overline">Task C</p>
            <button class="remove">Remove</button><br><br>
        </div>
    </div>
</body>

</html>
